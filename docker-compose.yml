# Docker Compose stack for the disc collection tracker.
# Database and cover images live in NAMED Docker volumes (see the `volumes:`
# block at the bottom) so they survive image rebuilds, `docker compose up
# --build`, and `docker compose down`. They are only removed if you explicitly
# run `docker compose down -v` (or `docker volume rm ...`).

services:
  app:
    build: .
    image: movie-tracker:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-movietracker}
      DB_USER: ${DB_USER:-movietracker}
      DB_PASSWORD: ${DB_PASSWORD:-movietracker}
      UPLOAD_DIR: /data/uploads
      OMDB_API_KEY: ${OMDB_API_KEY}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Cover images uploaded through the app, kept in a named volume so a
      # rebuild can't wipe them.
      - uploads_data:/data/uploads

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-movietracker}
      MYSQL_USER: ${DB_USER:-movietracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-movietracker}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      # MySQL data files in a named volume — persists across rebuilds.
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# Named volumes are managed by Docker and stored under its data root on the
# NAS. Use scripts/backup.sh to snapshot them to portable files you can keep
# wherever you like.
volumes:
  db_data:
  uploads_data:
